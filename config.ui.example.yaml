# UUID of an already-cloned/uploaded repository (returned by POST /api/v1/repos/clone
# or POST /api/v1/repos/upload). Replace this placeholder with the real id before
# sending the file to POST /api/v1/tasks.
repo_id: REPLACE_WITH_REPOSITORY_UUID

llm:
  provider: openai-compatible
  model: default
  api_key: ccc
  base_url: https://api.eliza.yandex.net/internal/deepseek-v3-1-terminus/v1
  temperature: 0.2
  max_tokens: 4000
  # Cluster-wide cap on parallel LLM sessions for this api_key. When set,
  # workers acquire a Redis-backed semaphore (key = sha256(api_key)) before
  # each agent.run, so writer/critic/diagrammer/planner all share this
  # pool. Set to your provider's inflight limit (Eliza default: 5) to
  # avoid HTTP 429. Omit for per-worker fallback only.
  max_sessions: 5

embeddings:
  provider: openai-compatible
  model: Qodo-Embed-1-7B
  api_key: ccc
  base_url: https://api.eliza.yandex.net/raw/internal/embedder-qodo/v1
  dimensions: 3584
  batch_size: 500
  concurrency: 4

generation:
  min_citations: 3
  max_nodes: 10
  chunk_size: 1000
  chunk_overlap: 200
  search_limit: 3
  min_page_score: 7
  max_page_retries: 2
  max_hallucination_retries: 3
