worker_id: "${WORKER_ID}"

# Cap on concurrent in-flight stream messages this worker process will
# dispatch. Real per-LLM-call ceiling is enforced by the cluster-wide
# session lock (LLMConfig.max_sessions); this is just the asyncio-level
# "how many handlers can be in-flight". Bumping higher = better
# overlap of LLM waits with non-LLM work (postgres, S3, embedding tools).
worker_concurrency: 12

llm:
  # Supported providers: openai-compatible (default), openai, anthropic,
  # ollama, yandex. For provider=anthropic api_key is required and
  # base_url is optional (defaults to api.anthropic.com).
  provider: openai-compatible
  model: default
  api_key: YOUR_LLM_API_KEY_HERE
  base_url: YOUR_LLM_BASE_URL_HERE
  temperature: 0.3
  max_tokens: 8000
  retry_max_attempts: 3
  retry_max_total_seconds: 120.0

redis:
  url: "redis://redis:6379"
  stream_prefix: "events"
  consumer_group: "workers"
  consumer_name: "worker-1"
  block_timeout_ms: 5000
  max_idle_time_ms: 120000
  stream_ttl_seconds: 86400

postgres:
  host: "postgres"
  port: 5432
  database: "docgen"
  user: "docgen"
  password: "docgen_password"

s3:
  endpoint_url: "http://localstack:4566"
  region: "us-east-1"
  access_key_id: "test"
  secret_access_key: "test"
  bucket: "source2doc-repos"

# Same Fernet key as gateway. Generate via ./generate-encryption-key.sh
encryption_key: TD2KIIv9GFMXnvAj/4Q11yURsMB1AshWU66uDBFAqMU=

logfire:
  enabled: false
  token: null

prompts_dir: "configs/agents"

# Liveness HTTP server (TZ РЗВ-03). Default port for docgen mode is 8100.
# health_host: 0.0.0.0
# health_port: 8100
