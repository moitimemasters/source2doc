worker_id: "${WORKER_ID}"

llm:
  provider: openai-compatible
  model: default
  api_key: YOUR_LLM_API_KEY_HERE
  base_url: YOUR_LLM_BASE_URL_HERE
  temperature: 0.3
  max_tokens: 8000

redis:
  url: "redis://redis:6379"
  stream_prefix: "events"
  consumer_group: "workers"
  consumer_name: "worker-1"
  block_timeout_ms: 5000
  max_idle_time_ms: 120000
  stream_ttl_seconds: 86400

postgres:
  host: "postgres"
  port: 5432
  database: "docgen"
  user: "docgen"
  password: "docgen_password"

s3:
  endpoint_url: "http://localstack:4566"
  region: "us-east-1"
  access_key_id: "test"
  secret_access_key: "test"
  bucket: "source2doc-repos"

# Same Fernet key as gateway. Generate via ./generate-encryption-key.sh
encryption_key: TD2KIIv9GFMXnvAj/4Q11yURsMB1AshWU66uDBFAqMU=

logfire:
  enabled: false
  token: null

prompts_dir: "configs/agents"

# Liveness HTTP server (TZ РЗВ-03). Default port for codetour mode is 8103.
# health_host: 0.0.0.0
# health_port: 8103
