worker_id: "worker-1"

llm:
  # Supported providers:
  #   openai-compatible — Yandex / vLLM / any OpenAI-style endpoint (default).
  #   openai            — api.openai.com.
  #   anthropic         — direct api.anthropic.com (requires api_key).
  #   ollama            — local http://host:11434/v1, api_key can be empty.
  #   yandex            — alias for openai-compatible with the Yandex transport.
  provider: openai-compatible
  model: default
  api_key: API_KEY
  base_url: https://api.eliza.yandex.net/internal/deepseek-v3-1-terminus/v1
  temperature: 0.3
  max_tokens: 8000
  # HTTP-layer retry budget for transient 5xx / 429 / connection errors.
  # 1s -> 2s -> 4s exponential backoff with +/-20% jitter.
  retry_max_attempts: 3
  retry_max_total_seconds: 120.0


redis:
  url: "redis://localhost:6379"
  stream_prefix: "events"
  consumer_group: "workers"
  consumer_name: "worker-1"
  block_timeout_ms: 5000
  max_idle_time_ms: 120000
  stream_ttl_seconds: 86400

postgres:
  host: "localhost"
  port: 5432
  database: "docgen"
  user: "docgen"
  password: "docgen_password"

s3:
  endpoint_url: "http://localhost:4566"
  region: "us-east-1"
  access_key_id: "test"
  secret_access_key: "test"
  bucket: "source2doc-repos"

bundler:
  # Maximum heading depth pulled into the autogenerated full Table of Contents
  # (toc.json + _toc.md written next to the formatter's index).  Set to 0 to
  # disable ToC generation.
  toc_max_depth: 2

encryption_key: YOUR_ENCRYPTION_KEY_HERE

# Path to agent prompts directory
# Can be relative (will be resolved to core/mvp/<path>) or absolute
# Default: "configs/agents" -> resolves to core/mvp/configs/agents
prompts_dir: "configs/agents"
