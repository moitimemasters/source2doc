[tool.uv.workspace]
members = ["mvp", "shared", "gateway", "worker", "codetour"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "B008",   # Allow function calls in argument defaults (FastAPI Depends, Typer)
    "B904",   # Allow raise without from in except blocks
    "SIM105", # Allow try-except-pass pattern
]

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "source2doc",
     "docgen-core",
    "codetour-core",
    "app",
    "worker",
    "local-folder",
]
sections = { "docgen-core" = [
    "docgen_core",
], "codetour-core" = [
    "codetour_core",
], "source2doc" = [
    "source2doc",
], "app" = [
    "app",
], "worker" = [
    "worker",
] }
lines-after-imports = 2
force-single-line = false
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
