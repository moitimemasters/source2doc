[pytest]
asyncio_mode = auto
testpaths =
    gateway/tests
    worker/tests
    shared/tests
    mvp/tests
    codetour/tests
# Skip e2e by default — they need real Docker containers (Postgres, Redis,
# LocalStack) and the testcontainers Python lib (only in `e2e` extra).
# Run them explicitly:
#   uv run --extra test --extra e2e pytest gateway/tests/e2e -m e2e
addopts = --import-mode=importlib -m "not e2e" --ignore=gateway/tests/e2e
markers =
    e2e: integration tests using testcontainers — require Docker socket access
