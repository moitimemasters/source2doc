llm:
  provider: openai-compatible
  model: default
  api_key: YOUR_API_KEY_HERE
  base_url: https://api.eliza.yandex.net/internal/deepseek-v3-1-terminus/v1
  temperature: 0.3
  max_tokens: 8000

qdrant:
  url: http://localhost:6333
  api_key: null

postgres:
  host: localhost
  port: 5432
  database: docgen
  user: docgen
  password: docgen_password

redis:
  url: redis://localhost:6379
  stream_prefix: codetour
  consumer_group: codetour_workers
  consumer_name: codetour-worker-1
  block_timeout_ms: 5000
  max_idle_time_ms: 120000
  stream_ttl_seconds: 86400

logging:
  level: INFO

prompts:
  codetour_generator: configs/agents/codetour_generator.yaml

generation:
  max_steps: 10
  max_files_per_step: 5
  search_limit: 5
