# Static Traefik routing for the source2doc stack.
#
# This replaces the docker label-based provider so traefik never has to
# talk to the docker socket — sidesteps the "client version 1.24 is too
# old" failure on modern dockerd where Traefik's bundled Go SDK can't
# negotiate a high-enough API version.
#
# Routes mirror the previous label-based config 1:1:
#   - /api/v1*  → gateway service (priority 10)
#   - /*        → ui service       (priority 1, catch-all)

http:
  routers:
    gateway:
      rule: "PathPrefix(`/api/v1`)"
      entryPoints:
        - web
      service: gateway
      priority: 10
    ui:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: ui
      priority: 1
  services:
    gateway:
      loadBalancer:
        servers:
          - url: "http://gateway:8003"
    ui:
      loadBalancer:
        servers:
          - url: "http://ui:3000"
