services:
  # PostgreSQL database for documentation storage
  postgres:
    image: postgres:16-alpine
    container_name: source2doc-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: docgen
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docgen_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - source2doc

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: source2doc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@source2doc.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - source2doc

  # Redis for event streaming (already used by MVP)
  redis:
    image: redis:7-alpine
    container_name: source2doc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - source2doc

  # Qdrant vector database (already used by MVP)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: source2doc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - source2doc

  # LocalStack for S3-compatible storage
  localstack:
    image: localstack/localstack:4.0
    container_name: source2doc-localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init/init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - source2doc

  # App services (start with: docker compose --profile app up)
  # Traefik reverse proxy — single ingress on :80 for UI + Gateway.
  # Routing is driven by Docker provider labels on `gateway` and `ui` services
  # below (PathPrefix(`/api/v1`) → gateway with priority 10, PathPrefix(`/`) →
  # ui with priority 1, so the more specific gateway rule wins).
  # SSE works out of the box: Traefik does not buffer responses, so the
  # gateway's `/api/v1/streams/*` and `/api/v1/logs/*` SSE endpoints stream
  # through unchanged.
  # Dev ports `8003:8003` (gateway) and `3001:3000` (ui) are kept so existing
  # local workflows keep working alongside the new `:80` ingress.
  traefik:
    image: traefik:v3.2
    container_name: source2doc-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard (insecure, debug only)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - source2doc
    profiles: [app]

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    profiles: [app]
    env_file:
      - .env
    volumes:
      - ./core/gateway/config.docker.yaml:/app/core/gateway/config.yaml:ro
    networks:
      - source2doc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=10"
      - "traefik.http.services.gateway.loadbalancer.server.port=8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      localstack:
        condition: service_healthy
    # The gateway image has python but no curl, so we probe via stdlib.
    # /health returns 503 if any dependency probe fails; the healthcheck
    # surfaces that as "unhealthy" so ops can spot a degraded gateway.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker-docgen:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    profiles: [app]
    command: ["uv", "run", "worker", "docgen"]
    env_file:
      - .env
    environment:
      - WORKER_ID=worker-docgen
      - AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      - AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
    volumes:
      - ./core/worker/config.docker.yaml:/app/core/worker/config.yaml:ro
      - ./deploy/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      localstack:
        condition: service_healthy
    # Worker image has no curl; probe the in-process /health via stdlib.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - source2doc

  worker-repos:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    profiles: [app]
    command: ["uv", "run", "worker", "repos"]
    env_file:
      - .env
    environment:
      - WORKER_ID=worker-repos
      - AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      - AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
    volumes:
      - ./core/worker/config.docker.yaml:/app/core/worker/config.yaml:ro
      - ./deploy/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8101/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - source2doc

  worker-bundler:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    profiles: [app]
    command: ["uv", "run", "worker", "bundler"]
    env_file:
      - .env
    environment:
      - WORKER_ID=worker-bundler
      - AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      - AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
    volumes:
      - ./core/worker/config.docker.yaml:/app/core/worker/config.yaml:ro
      - ./deploy/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8102/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - source2doc

  worker-codetour:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    profiles: [app]
    command: ["uv", "run", "worker", "codetour"]
    env_file:
      - .env
    environment:
      - WORKER_ID=worker-codetour
      - AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      - AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
    volumes:
      - ./core/worker/config.docker.yaml:/app/core/worker/config.yaml:ro
      - ./deploy/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8103/health', timeout=4).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - source2doc

  ui:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.ui
    profiles: [app]
    ports:
      - "3001:3000"
    environment:
      # Server-side: reach gateway by service DNS inside source2doc network.
      # Browser-side: hit Traefik on :80 which routes /api/v1/* to gateway.
      - GATEWAY_URL=http://gateway:8003
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=PathPrefix(`/`)"
      - "traefik.http.routers.ui.entrypoints=web"
      - "traefik.http.routers.ui.priority=1"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"
    depends_on:
      gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - source2doc

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  localstack_data:
    driver: local

networks:
  source2doc:
    driver: bridge
    # IPv6 / custom subnet pinning live in docker-compose.override.yml so
    # the base stack stays portable across hosts that already use
    # 172.30.0.0/24 or the fd00::/8 ULA range for other Docker networks
    # (VPN tunnels, k3s, other compose stacks).
